version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['O', 'F', 'P']

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_name
        tests:
          - not_null



  - name: dim_customers
    description: >
      Customer dimension table. Grain: one row per customer.
      Contains all descriptive attributes used to give context
      to fct_orders. Used by Marketing to slice revenue by
      segment and by Finance for customer level reporting.
    columns:
      - name: customer_key
        description: Surrogate key generated by dbt_utils. Primary key of this dimension.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Natural key from source system. Kept for traceability.
        tests:
          - unique
          - not_null

      - name: customer_name
        description: Full name of the customer.
        tests:
          - not_null

      - name: market_segment
        description: The market segment this customer belongs to.
        tests:
          - not_null
          - accepted_values:
              values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']

  - name: dim_dates
    description: >
      Date dimension table. Grain: one row per calendar date.
      Covers 1992-01-01 to 2000-12-31 matching TPCH data range.
      Pre-calculates day, week, month, quarter and year attributes
      so Power BI dashboards do not need complex date logic.
    columns:
      - name: date_key
        description: Surrogate key. Date as integer e.g. 19920115. Primary key of this dimension.
        tests:
          - unique
          - not_null

      - name: full_date
        description: The full calendar date.
        tests:
          - unique
          - not_null

      - name: month_name
        description: Full month name e.g. January, February.
        tests:
          - not_null

      - name: quarter_name
        description: Quarter name e.g. Q1, Q2, Q3, Q4.
        tests:
          - not_null
          - accepted_values:
              values: ['Q1', 'Q2', 'Q3', 'Q4']

  - name: fct_orders
    description: >
      Core orders fact table. Grain: one row per order.
      Contains all measurable order events with foreign keys
      to dim_customers and dim_dates.
      Used by Marketing for revenue by segment,
      Finance for revenue by period,
      Management for KPI reporting.
    columns:
      - name: order_id
        description: Primary key. Unique identifier for each order.
        tests:
          - unique
          - not_null

      - name: customer_key
        description: Foreign key to dim_customers surrogate key.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key

      - name: date_key
        description: Foreign key to dim_dates surrogate key.
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key

      - name: order_amount
        description: Total order value in USD.
        tests:
          - not_null

      - name: order_amount_gbp
        description: Total order value converted to GBP at 0.79 exchange rate.
        tests:
          - not_null

                   
